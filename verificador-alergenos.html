<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8f6f2">
<title>AlérgiCheck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f2; --surface: #ffffff; --surface2: #f1ede6;
    --text: #1a1714; --text2: #6b6560; --text3: #a09a94;
    --border: rgba(26,23,20,0.1); --border2: rgba(26,23,20,0.18);
    --danger-bg: #fff2f2; --danger-text: #c0392b; --danger-border: #f5c0bb;
    --safe-bg: #f0faf4; --safe-text: #1e7e45; --safe-border: #b3e8c5;
    --warn-bg: #fffbf0; --warn-text: #b07d10; --warn-border: #f5dfa0;
    --info-bg: #f0f5ff; --info-text: #2c5fb3; --info-border: #b8ccf5;
    --accent: #c17f4a; --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

  /* NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; z-index: 20; }
  .nav-btn { flex: 1; padding: 10px 4px 12px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--text3); transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 10; }
  .header-inner { max-width: 520px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .logo h1 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: var(--text); }
  .page-title { font-size: 15px; font-weight: 500; color: var(--text); margin-left: 4px; }

  /* PAGES */
  .page { display: none; max-width: 520px; margin: 0 auto; padding: 16px 16px 0; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  .card-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; padding: 11px 13px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); background: var(--surface); }
  .field textarea { resize: none; height: 100px; line-height: 1.5; }
  .field-hint { font-size: 11px; color: var(--text3); margin-top: 4px; line-height: 1.5; }
  .field-hint a { color: var(--info-text); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }

  /* BUTTONS */
  .btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-accent { background: var(--accent); color: white; border-color: var(--accent); margin-top: 4px; }
  .btn-outline { border-color: var(--accent); color: var(--accent); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .btn-danger { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }

  /* CAMERA */
  .camera-area { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color 0.15s; margin-bottom: 12px; }
  .camera-area:hover { border-color: var(--accent); }
  .camera-area svg { width: 36px; height: 36px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 8px; }
  .camera-area p { font-size: 13px; color: var(--text2); }
  .camera-area small { font-size: 11px; color: var(--text3); }
  #camera-input { display: none; }
  .preview-img { width: 100%; border-radius: var(--radius-sm); margin-bottom: 12px; max-height: 200px; object-fit: cover; display: none; }

  /* RESULTS */
  .result { border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; border: 0.5px solid; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .result-danger { background: var(--danger-bg); border-color: var(--danger-border); }
  .result-safe   { background: var(--safe-bg);   border-color: var(--safe-border); }
  .result-warn   { background: var(--warn-bg);   border-color: var(--warn-border); }
  .result-info   { background: var(--info-bg);   border-color: var(--info-border); }
  .result-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot-danger { background: var(--danger-text); }
  .dot-safe   { background: var(--safe-text); }
  .dot-warn   { background: var(--warn-text); }
  .dot-info   { background: var(--info-text); }
  .result-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
  .result-title.danger { color: var(--danger-text); }
  .result-title.safe   { color: var(--safe-text); }
  .result-title.warn   { color: var(--warn-text); }
  .result-title.info   { color: var(--info-text); }
  .result-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .result-note { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.5; }
  .allergen-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .allergen-item { background: var(--surface); border-radius: var(--radius-sm); border: 0.5px solid var(--border); padding: 9px 12px; }
  .allergen-name { font-size: 13px; font-weight: 500; color: var(--danger-text); }
  .allergen-found { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* LOADING */
  .loading { text-align: center; padding: 24px; color: var(--text2); font-size: 13px; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 14px; }
  .spinner { display: block; width: 22px; height: 22px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ALLERGENS */
  .allergen-section { background: var(--surface2); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px; }
  .allergen-section h3 { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { font-size: 12px; padding: 4px 11px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 20px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .tag-remove { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; line-height: 1; padding: 0; }
  .tag-remove:hover { color: var(--danger-text); }

  /* HISTORY */
  .history-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .history-item:hover { border-color: var(--border2); }
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .history-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .history-date { font-size: 11px; color: var(--text3); }
  .history-status { font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .badge-safe { background: var(--safe-bg); color: var(--safe-text); border: 0.5px solid var(--safe-border); }
  .badge-danger { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-border); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  .empty-state svg { width: 40px; height: 40px; stroke: var(--border2); fill: none; stroke-width: 1.5; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    <h1>AlérgiCheck</h1>
    <span class="page-title" id="page-title"></span>
  </div>
</header>

<!-- PAGE: VERIFICAR -->
<div class="page active" id="page-verificar">
  <div class="card">
    <div class="card-title">Produto</div>
    <div class="row2">
      <div class="field">
        <label>Nome do produto</label>
        <input type="text" id="product-name" placeholder="ex: Hidratante Milk" autocomplete="off" />
      </div>
      <div class="field">
        <label>Marca</label>
        <input type="text" id="brand-name" placeholder="ex: Dove" autocomplete="off" />
      </div>
    </div>
    <hr class="divider">

    <!-- CAMERA -->
    <div class="card-title">Fotografar rótulo</div>
    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
    <img id="preview-img" class="preview-img" />
    <div class="camera-area" onclick="document.getElementById('camera-input').click()">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <p>Tirar foto do rótulo</p>
      <small>A câmera lerá os ingredientes automaticamente</small>
    </div>
    <div id="ocr-result-area"></div>

    <hr class="divider">
    <div class="field">
      <label>Ingredientes (da foto ou cole manualmente)</label>
      <textarea id="ingredients" placeholder="Os ingredientes serão extraídos da foto, ou cole manualmente da embalagem, incibeauty.com ou cosdna.com"></textarea>
      <div class="field-hint">Fontes: <a href="https://incibeauty.com" target="_blank">incibeauty.com</a> · <a href="https://cosdna.com" target="_blank">cosdna.com</a></div>
    </div>
    <button class="btn btn-accent" onclick="checkIngredients()">Verificar alérgenos</button>
  </div>
  <div id="result-area"></div>
</div>

<!-- PAGE: HISTÓRICO -->
<div class="page" id="page-historico">
  <div id="history-list"></div>
</div>

<!-- PAGE: ALÉRGENOS -->
<div class="page" id="page-alergenos">
  <div class="card">
    <div class="card-title">Adicionar novo alérgeno</div>
    <div class="field">
      <label>Nome do alérgeno</label>
      <input type="text" id="new-allergen-name" placeholder="ex: Formaldeído" autocomplete="off" />
    </div>
    <div class="field">
      <label>Nomes técnicos (separados por vírgula)</label>
      <input type="text" id="new-allergen-variants" placeholder="ex: formaldehyde, formalin, methanal" autocomplete="off" />
      <div class="field-hint">Pesquise o nome INCI do ingrediente em incibeauty.com</div>
    </div>
    <button class="btn btn-accent" onclick="addAllergen()">Adicionar alérgeno</button>
  </div>
  <div id="allergens-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-verificar" onclick="showPage('verificar')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Verificar
  </button>
  <button class="nav-btn" id="nav-historico" onclick="showPage('historico')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Histórico
  </button>
  <button class="nav-btn" id="nav-alergenos" onclick="showPage('alergenos')">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Alérgenos
  </button>
</nav>

<script>
// ---- ALLERGENS DATA ----
const DEFAULT_ALLERGENS = [
  { name: "Kathon CG", variants: ["kathon", "methylchloroisothiazolinone", "methylisothiazolinone", "mci/mi", "isothiazolinone", "cmit", "mit"] },
  { name: "Trietalonamina", variants: ["triethanolamine", "tea-", "trietanolamina", "trolamine"] },
  { name: "Amerchol L101", variants: ["amerchol", "lanolin alcohol", "acetylated lanolin", "lanolin", "adeps lanae", "wool wax alcohol", "wool fat"] },
  { name: "Cloreto de cobalto", variants: ["cobalt chloride", "cobalt", "cobalto"] },
  { name: "Parabenos mix", variants: ["paraben", "methylparaben", "ethylparaben", "propylparaben", "butylparaben", "isobutylparaben", "isopropylparaben", "benzylparaben"] },
  { name: "Parafenilenodiamina", variants: ["p-phenylenediamine", "phenylenediamine", "ppd", "para-phenylenediamine", "parafenileno"] },
  { name: "Sulfato de níquel", variants: ["nickel sulfate", "nickel", "niquel", "níquel"] }
];

function getAllergens() {
  try { return JSON.parse(localStorage.getItem('allergens')) || DEFAULT_ALLERGENS; } catch { return DEFAULT_ALLERGENS; }
}
function saveAllergens(a) { localStorage.setItem('allergens', JSON.stringify(a)); }
function getHistory() {
  try { return JSON.parse(localStorage.getItem('history')) || []; } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('history', JSON.stringify(h)); }

// ---- NAVIGATION ----
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  const titles = { verificar: '', historico: '— Histórico', alergenos: '— Meus Alérgenos' };
  document.getElementById('page-title').textContent = titles[name];
  if (name === 'historico') renderHistory();
  if (name === 'alergenos') renderAllergens();
}

// ---- CAMERA / OCR ----
function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const preview = document.getElementById('preview-img');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  extractTextFromImage(file);
}

async function extractTextFromImage(file) {
  const area = document.getElementById('ocr-result-area');
  area.innerHTML = '<div class="loading"><div class="spinner"></div>Lendo ingredientes da foto...</div>';

  try {
    const base64 = await toBase64(file);
    const base64Data = base64.split(',')[1];
    const mimeType = file.type || 'image/jpeg';

    const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + getGeminiKey(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: mimeType, data: base64Data } },
            { text: 'Esta é uma foto de um rótulo de produto cosmético. Extraia APENAS a lista de ingredientes (INCI) que aparece na imagem. Retorne somente os ingredientes separados por vírgula, sem nenhum texto adicional. Se não encontrar ingredientes, retorne apenas: NÃO ENCONTRADO' }
          ]
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('').trim();

    if (!text || text === 'NÃO ENCONTRADO') {
      area.innerHTML = '<div class="result result-warn"><div class="result-header"><div class="status-dot dot-warn"></div><div class="result-title warn">Ingredientes não encontrados na foto</div></div><p class="result-body">Não foi possível ler os ingredientes. Tente uma foto mais próxima e nítida, ou cole manualmente.</p></div>';
    } else {
      document.getElementById('ingredients').value = text;
      area.innerHTML = '<div class="result result-info"><div class="result-header"><div class="status-dot dot-info"></div><div class="result-title info">Ingredientes extraídos da foto!</div></div><p class="result-body">Revise o texto extraído e clique em Verificar alérgenos.</p></div>';
    }
  } catch(err) {
    area.innerHTML = '<div class="result result-warn"><div class="result-header"><div class="status-dot dot-warn"></div><div class="result-title warn">Erro ao ler a foto</div></div><p class="result-body">Configure sua chave Gemini na aba Alérgenos, ou cole os ingredientes manualmente.</p></div>';
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function getGeminiKey() { return localStorage.getItem('gemini_key') || ''; }

// ---- CHECK ALLERGENS ----
function checkIngredients() {
  const productName = document.getElementById('product-name').value.trim();
  const brand = document.getElementById('brand-name').value.trim();
  const ingredients = document.getElementById('ingredients').value.trim();
  const resultArea = document.getElementById('result-area');

  if (!ingredients) {
    resultArea.innerHTML = `<div class="result result-warn"><div class="result-header"><div class="status-dot dot-warn"></div><div class="result-title warn">Ingredientes não informados</div></div><p class="result-body">Fotografe o rótulo ou cole a lista de ingredientes manualmente.</p></div>`;
    return;
  }

  const allergens = getAllergens();
  const ingredientsLower = ingredients.toLowerCase();
  const found = [];

  for (const allergen of allergens) {
    const matches = [];
    for (const variant of allergen.variants) {
      if (ingredientsLower.includes(variant.toLowerCase())) {
        const match = ingredients.match(new RegExp(variant.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'));
        if (match) matches.push(match[0]);
      }
    }
    if (matches.length > 0) found.push({ allergen: allergen.name, found: [...new Set(matches)] });
  }

  const productLabel = [brand, productName].filter(Boolean).join(' — ') || 'Produto analisado';
  const safe = found.length === 0;

  // Save to history
  const history = getHistory();
  history.unshift({
    id: Date.now(),
    product: productName,
    brand: brand,
    ingredients: ingredients,
    found: found,
    safe: safe,
    date: new Date().toLocaleDateString('pt-BR')
  });
  saveHistory(history.slice(0, 50));

  if (safe) {
    resultArea.innerHTML = `
      <div class="result result-safe">
        <div class="result-header"><div class="status-dot dot-safe"></div><div class="result-title safe">${productLabel}</div></div>
        <p class="result-body">Nenhum alérgeno identificado. O produto parece seguro para você.</p>
        <p class="result-note">Sempre confirme no rótulo original e consulte seu dermatologista.</p>
      </div>`;
  } else {
    resultArea.innerHTML = `
      <div class="result result-danger">
        <div class="result-header"><div class="status-dot dot-danger"></div><div class="result-title danger">${productLabel} — ${found.length} alérgeno${found.length > 1 ? 's' : ''} detectado${found.length > 1 ? 's' : ''}</div></div>
        <p class="result-body">Este produto contém ingredientes que podem causar reação. Evite o uso e consulte seu dermatologista.</p>
        <ul class="allergen-list">
          ${found.map(f => `<li class="allergen-item"><div class="allergen-name">${f.allergen}</div><div class="allergen-found">Encontrado como: ${f.found.join(', ')}</div></li>`).join('')}
        </ul>
      </div>`;
  }
  resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ---- HISTORY ----
function renderHistory() {
  const history = getHistory();
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Nenhum produto verificado ainda.</p></div>`;
    return;
  }
  el.innerHTML = history.map(item => `
    <div class="history-item" onclick="loadFromHistory(${item.id})">
      <div class="history-header">
        <span class="history-name">${[item.brand, item.product].filter(Boolean).join(' — ') || 'Produto sem nome'}</span>
        <span class="history-date">${item.date}</span>
      </div>
      <div class="history-status">
        ${item.safe
          ? '<span class="badge badge-safe">✓ Seguro</span>'
          : `<span class="badge badge-danger">⚠ ${item.found.length} alérgeno${item.found.length > 1 ? 's' : ''}</span>`
        }
      </div>
    </div>`).join('');
}

function loadFromHistory(id) {
  const item = getHistory().find(h => h.id === id);
  if (!item) return;
  document.getElementById('product-name').value = item.product || '';
  document.getElementById('brand-name').value = item.brand || '';
  document.getElementById('ingredients').value = item.ingredients || '';
  showPage('verificar');
  setTimeout(() => checkIngredients(), 100);
}

// ---- ALLERGENS MANAGEMENT ----
function renderAllergens() {
  const allergens = getAllergens();
  const el = document.getElementById('allergens-list');

  // Gemini key config
  const savedKey = getGeminiKey();
  const keySection = `
    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">Chave Gemini (para leitura de fotos)</div>
      <div class="field">
        <label>Chave API Google Gemini</label>
        <input type="password" id="gemini-key-input" placeholder="AIza..." value="${savedKey}" autocomplete="off"/>
        <div class="field-hint">Gratuita em <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> — necessária só para ler fotos de rótulos</div>
      </div>
      <button class="btn btn-outline" onclick="saveGeminiKey()">Salvar chave</button>
    </div>`;

  el.innerHTML = keySection + `
    <div class="allergen-section">
      <h3>Alérgenos cadastrados (${allergens.length})</h3>
      <div class="tags" id="allergen-tags">
        ${allergens.map((a, i) => `
          <span class="tag">
            ${a.name}
            <button class="tag-remove" onclick="removeAllergen(${i})" title="Remover">×</button>
          </span>`).join('')}
      </div>
    </div>`;
}

function saveGeminiKey() {
  const val = document.getElementById('gemini-key-input').value.trim();
  localStorage.setItem('gemini_key', val);
  alert('Chave salva! Agora você pode usar a câmera para ler rótulos.');
}

function addAllergen() {
  const name = document.getElementById('new-allergen-name').value.trim();
  const variantsRaw = document.getElementById('new-allergen-variants').value.trim();
  if (!name) { alert('Digite o nome do alérgeno.'); return; }
  const variants = variantsRaw ? variantsRaw.split(',').map(v => v.trim().toLowerCase()).filter(Boolean) : [name.toLowerCase()];
  const allergens = getAllergens();
  allergens.push({ name, variants });
  saveAllergens(allergens);
  document.getElementById('new-allergen-name').value = '';
  document.getElementById('new-allergen-variants').value = '';
  renderAllergens();
  alert(`"${name}" adicionado aos seus alérgenos!`);
}

function removeAllergen(index) {
  if (!confirm('Remover este alérgeno?')) return;
  const allergens = getAllergens();
  allergens.splice(index, 1);
  saveAllergens(allergens);
  renderAllergens();
}

// Init
showPage('verificar');
</script>
</body>
</html>
